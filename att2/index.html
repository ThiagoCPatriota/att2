<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Toxicidade de Chumbo</title>
    <link rel="stylesheet" href="style.css">
    <style>

    </style>
</head>
<body>

<div class="container">
    <h2>Teste de Nível de Chumbo</h2>
    <p class="info">Conforme nossos critérios, concentrações superiores a <strong>10g por litro</strong> de sangue são tóxicas.</p>
    
    <form id="formChumbo">
        <label for="volumeSangue">Volume de Sangue (Litros):</label>
        <input type="number" id="volumeSangue" value="7" title="Valor pré-determinado">

        <label for="totalChumbo">Quantidade Total de Chumbo (Gramas):</label>
        <input type="number" id="totalChumbo" placeholder="Ex: 75" required>

        <button type="submit">Calcular Nível</button>
    </form>

    <div id="resultado" class="result"></div>
</div>

<script>
    // Intercepta o envio do formulário
    document.getElementById('formChumbo').addEventListener('submit', function(event) {
        // Evita que a página recarregue ao enviar o formulário
        event.preventDefault();

        // Pega os valores dos campos
        const volume = parseFloat(document.getElementById('volumeSangue').value);
        const chumbo = parseFloat(document.getElementById('totalChumbo').value);

        const concentracao = chumbo / volume;

        const divResultado = document.getElementById('resultado');
        divResultado.style.display = 'block';

        if (concentracao > 10) {
            divResultado.className = 'result alerta';
            divResultado.innerHTML = `⚠️ ALERTA: Nível Tóxico!<br><br>
                                      Concentração: <strong>${concentracao} g/L</strong>.<br>
                                      O valor está acima do limite seguro.`;
        } else {
            divResultado.className = 'result seguro';
            divResultado.innerHTML = `✅ Nível Seguro.<br><br>
                                      Concentração: <strong>${concentracao} g/L</strong>.<br>
                                      O valor está dentro do limite aceitável.`;
        }
    });
</script>

</body>
</html>
